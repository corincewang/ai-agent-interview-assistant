services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-agent-interview-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_agent_interview_assistant
    ports:
      - "5433cd /Users/wanghan/Desktop/ai-agent-interview-assistant:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_agent_interview_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
